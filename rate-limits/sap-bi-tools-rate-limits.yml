specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: SAP BI Tools
providerId: sap-bi-tools
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Analytics
  - Business Intelligence
  - Data Visualization
  - Reporting
  - SAP
description: SAP BI Tools surface APIs through BusinessObjects RESTful Web Services; rate-limit and concurrency limits are governed by the customer's deployment (CMS configuration) rather than a published public limit.
sources:
  - https://api.sap.com/bi-tools
  - https://help.sap.com/docs/SAP_BUSINESSOBJECTS_BUSINESS_INTELLIGENCE_PLATFORM
notes: Provider documentation pages render via client-side JavaScript or sit behind a partner portal; static rate-limit numbers are not exposed to automated fetches. Reconcile from the per-product SAP Help Portal section or partner developer portal.
responseCodes:
  throttled: 429
limits:
  - name: Per-service quotas
    scope: account/region/service
    metric: varies
    limit: see provider documentation; gated or partner-only
policies:
  - name: Documentation location
    description: Rate limits are documented per service in the SAP Help Portal or the SAP Concur developer
      portal; consult the relevant section for current numbers.
  - name: Contract-governed
    description: Effective limits depend on the customer's BTP entitlement, partner application, or negotiated
      contract.
maintainers:

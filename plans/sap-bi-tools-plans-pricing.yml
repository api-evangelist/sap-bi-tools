description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: sap-bi-tools-free
    name: Free
    type: freemium
    description: Free entry tier for the SAP BI Tools API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.sapanalytics.cloud
          - https://server:port/biprws
          - https://api.hana.ondemand.com
          - https://datasphere-api.cfapps.eu10.hana.ondemand.com
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.sapanalytics.cloud
          - https://server:port/biprws
          - https://api.hana.ondemand.com
          - https://datasphere-api.cfapps.eu10.hana.ondemand.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: SAP Analytics Cloud API
      - name: SAP Analytics Cloud Data Export API
      - name: SAP Analytics Cloud Content Network REST API
      - name: SAP Analytics Cloud Analytics Designer API
      - name: SAP BusinessObjects BI Platform RESTful Web Services
      - name: SAP BusinessObjects Web Intelligence RESTful Web Services API
      - name: SAP BusinessObjects BI Semantic Layer REST API
      - name: SAP Crystal Reports RESTful Web Services API
  - id: sap-bi-tools-pro
    name: Professional
    type: paid
    description: Production tier for SAP BI Tools. Provides higher quotas, priority support, and access
      to the broader API portfolio. Pricing placeholder; align with the provider's pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - https://api.sapanalytics.cloud
          - https://server:port/biprws
          - https://api.hana.ondemand.com
          - https://datasphere-api.cfapps.eu10.hana.ondemand.com
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - https://api.sapanalytics.cloud
          - https://server:port/biprws
          - https://api.hana.ondemand.com
          - https://datasphere-api.cfapps.eu10.hana.ondemand.com
        unit: 1
        price: '0.00'
        userMultiplied: false

        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://api.sapanalytics.cloud
          - https://server:port/biprws
          - https://api.hana.ondemand.com
          - https://datasphere-api.cfapps.eu10.hana.ondemand.com

naftiko: "1.0.0-alpha1"

info:
  label: "SAP Analytics Cloud Content Network API"
  description: "REST API for managing content in the SAP Analytics Cloud Content Network. Enables programmatic access to get, publish, and delete private and public content items."
  tags:
    - Analytics
    - Content Management
    - Cloud
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_AC_OAUTH_TOKEN: SAP_AC_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: analytics-cloud-content-network
      baseUri: https://{tenant}.{datacenter}.sapanalytics.cloud
      description: "SAP Analytics Cloud Content Network REST API for sharing and importing content packages."
      authentication:
        type: bearer
        token: "{{SAP_AC_OAUTH_TOKEN}}"
      resources:
        - name: content-items
          path: /api/v1/contentnetwork/items
          description: "Content items in the Content Network."
          operations:
            - name: list-content-items
              method: GET
              description: "List content items available in the Content Network."
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by content item type"
                - name: visibility
                  in: query
                  type: string
                  required: false
                  description: "Filter by visibility (PRIVATE or PUBLIC)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: publish-content-item
              method: POST
              description: "Publish a content item to the Content Network."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  resourceId: "{{tools.resourceId}}"
                  visibility: "{{tools.visibility}}"
            - name: get-content-item
              method: GET
              description: "Get a content item by its unique ID."
              inputParameters:
                - name: itemId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the content item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-content-item
              method: DELETE
              description: "Delete a content item from the Content Network."
              inputParameters:
                - name: itemId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the content item"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: import-content-item
              method: POST
              description: "Import a content item from the Content Network into the local tenant."
              inputParameters:
                - name: itemId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the content item to import"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  targetFolderId: "{{tools.targetFolderId}}"
                  overwrite: "{{tools.overwrite}}"

  exposes:
    - type: rest
      port: 8101
      namespace: content-network-api
      resources:
        - path: /v1/content-items
          name: content-items
          description: "Content Network item management."
          operations:
            - method: GET
              name: list-content-items
              description: "List content items."
              call: "analytics-cloud-content-network.list-content-items"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/content-items/{itemId}
          name: content-item
          description: "Single content item."
          operations:
            - method: GET
              name: get-content-item
              description: "Get a content item by ID."
              call: "analytics-cloud-content-network.get-content-item"
              with:
                itemId: "rest.itemId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: content-network-mcp
      transport: http
      tools:
        - name: list-content-items
          description: "List content items available in the SAP Analytics Cloud Content Network."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud-content-network.list-content-items"
          outputParameters:
            - type: array
              mapping: "$."
        - name: publish-content-item
          description: "Publish a local content item to the Content Network for sharing."
          hints:
            readOnly: false
            openWorld: false
          call: "analytics-cloud-content-network.publish-content-item"
          with:
            name: "tools.name"
            resourceId: "tools.resourceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: import-content-item
          description: "Import a content item from the Content Network into the local tenant."
          hints:
            readOnly: false
            openWorld: false
          call: "analytics-cloud-content-network.import-content-item"
          with:
            itemId: "tools.itemId"
          outputParameters:
            - type: object
              mapping: "$."

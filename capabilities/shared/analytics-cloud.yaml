naftiko: "1.0.0-alpha1"

info:
  label: "SAP Analytics Cloud API"
  description: "RESTful API for SAP Analytics Cloud enabling programmatic access to stories, models, users, teams, calendars, and other resources. Authentication uses OAuth 2.0."
  tags:
    - Analytics
    - Business Intelligence
    - Cloud
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_AC_OAUTH_TOKEN: SAP_AC_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: analytics-cloud
      baseUri: https://{tenant}.{datacenter}.sapanalytics.cloud
      description: "SAP Analytics Cloud REST API for managing stories, resources, users, and teams."
      authentication:
        type: bearer
        token: "{{SAP_AC_OAUTH_TOKEN}}"
      resources:
        - name: stories
          path: /api/v1/stories
          description: "Manage analytic stories including dashboards and reports."
          operations:
            - name: list-stories
              method: GET
              description: "List all stories available on the SAP Analytics Cloud tenant."
              inputParameters:
                - name: include
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated related resources to include (e.g., models)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: get-story
              method: GET
              description: "Get a story by its unique ID."
              inputParameters:
                - name: storyId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the story"
                - name: include
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated related resources to include"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: resources
          path: /api/v1/Resources
          description: "Browse and manage resources in the SAP Analytics Cloud file repository."
          operations:
            - name: list-resources
              method: GET
              description: "List resources including stories, models, and folders."
              inputParameters:
                - name: resourceType
                  in: query
                  type: string
                  required: false
                  description: "Filter by resource type (STORY, MODEL, FOLDER)"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of records to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Number of records to skip for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

        - name: users
          path: /api/v1/scim2/Users
          description: "SCIM 2.0 endpoints for managing user accounts."
          operations:
            - name: list-users
              method: GET
              description: "List users using SCIM 2.0 protocol."
              inputParameters:
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "SCIM 2.0 filter expression"
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user using SCIM 2.0 protocol."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userName: "{{tools.userName}}"
                  displayName: "{{tools.displayName}}"
            - name: get-user
              method: GET
              description: "Get a user by ID using SCIM 2.0."
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-user
              method: PUT
              description: "Update a user record using SCIM 2.0."
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userName: "{{tools.userName}}"
            - name: delete-user
              method: DELETE
              description: "Delete a user from SAP Analytics Cloud."
              inputParameters:
                - name: userId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the user"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /api/v1/scim2/Groups
          description: "SCIM 2.0 endpoints for managing teams and group memberships."
          operations:
            - name: list-teams
              method: GET
              description: "List teams using SCIM 2.0 protocol."
              inputParameters:
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: "SCIM 2.0 filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-team
              method: POST
              description: "Create a new team using SCIM 2.0 protocol."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  displayName: "{{tools.displayName}}"

        - name: calendars
          path: /api/v1/calendars
          description: "Manage calendar events and tasks for planning workflows."
          operations:
            - name: list-calendars
              method: GET
              description: "List calendar events and planning tasks."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: analytics-cloud-api
      resources:
        - path: /v1/stories
          name: stories
          description: "Analytics Cloud story management."
          operations:
            - method: GET
              name: list-stories
              description: "List all analytics stories."
              call: "analytics-cloud.list-stories"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/stories/{storyId}
          name: story
          description: "Single analytics story."
          operations:
            - method: GET
              name: get-story
              description: "Get a story by ID."
              call: "analytics-cloud.get-story"
              with:
                storyId: "rest.storyId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/resources
          name: resources
          description: "Analytics Cloud file repository resources."
          operations:
            - method: GET
              name: list-resources
              description: "List repository resources."
              call: "analytics-cloud.list-resources"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "User management via SCIM 2.0."
          operations:
            - method: GET
              name: list-users
              description: "List all users."
              call: "analytics-cloud.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/teams
          name: teams
          description: "Team management via SCIM 2.0."
          operations:
            - method: GET
              name: list-teams
              description: "List all teams."
              call: "analytics-cloud.list-teams"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/calendars
          name: calendars
          description: "Calendar events and planning tasks."
          operations:
            - method: GET
              name: list-calendars
              description: "List calendar events."
              call: "analytics-cloud.list-calendars"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: analytics-cloud-mcp
      transport: http
      tools:
        - name: list-stories
          description: "List analytics stories on the SAP Analytics Cloud tenant."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud.list-stories"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-story
          description: "Get details of a specific analytics story by ID."
          hints:
            readOnly: true
            openWorld: false
          call: "analytics-cloud.get-story"
          with:
            storyId: "tools.storyId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-resources
          description: "List file repository resources (stories, models, folders)."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud.list-resources"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-users
          description: "List users provisioned in SAP Analytics Cloud via SCIM 2.0."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new user in SAP Analytics Cloud via SCIM 2.0."
          hints:
            readOnly: false
            openWorld: false
          call: "analytics-cloud.create-user"
          with:
            userName: "tools.userName"
            displayName: "tools.displayName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-teams
          description: "List teams (groups) in SAP Analytics Cloud via SCIM 2.0."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud.list-teams"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-calendars
          description: "List calendar events and planning tasks."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud.list-calendars"
          outputParameters:
            - type: array
              mapping: "$."

naftiko: "1.0.0-alpha1"

info:
  label: "SAP Analytics Cloud Data Export API"
  description: "OData-based API for exporting fact data and master data from SAP Analytics Cloud models. Provides Administration and Provider service endpoints for discovering models and extracting data."
  tags:
    - Analytics
    - Data Export
    - OData
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_AC_OAUTH_TOKEN: SAP_AC_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: analytics-cloud-data-export
      baseUri: https://{tenant}.{datacenter}.sapanalytics.cloud/api/v1/dataexport
      description: "SAP Analytics Cloud Data Export API for extracting fact data and master data from planning models."
      authentication:
        type: bearer
        token: "{{SAP_AC_OAUTH_TOKEN}}"
      resources:
        - name: namespaces
          path: /administration/Namespaces
          description: "Administration service for discovering namespaces."
          operations:
            - name: list-namespaces
              method: GET
              description: "List available namespaces for data export."
              inputParameters:
                - name: $format
                  in: query
                  type: string
                  required: false
                  description: "Response format (JSON or XML)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: providers
          path: /administration/Namespaces(NamespaceID='{namespaceId}')/Providers
          description: "List available providers (models) for data export."
          operations:
            - name: list-providers
              method: GET
              description: "List available providers (models) in a namespace."
              inputParameters:
                - name: namespaceId
                  in: path
                  type: string
                  required: true
                  description: "The namespace identifier (typically 'sac')"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip for pagination"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: model-metadata
          path: /providers/sac/{modelId}/$metadata
          description: "OData metadata for a specific model."
          operations:
            - name: get-model-metadata
              method: GET
              description: "Get OData metadata for a model describing its structure."
              inputParameters:
                - name: modelId
                  in: path
                  type: string
                  required: true
                  description: "The unique provider (model) identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: fact-data
          path: /providers/sac/{modelId}/FactData
          description: "Fact data from a specific model."
          operations:
            - name: get-fact-data
              method: GET
              description: "Retrieve fact data (transactional records) from a model."
              inputParameters:
                - name: modelId
                  in: path
                  type: string
                  required: true
                  description: "The unique provider (model) identifier"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return"
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Records to skip for pagination"
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression"
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated properties to include"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: master-data
          path: /providers/sac/{modelId}/MasterData
          description: "Master data from a specific model."
          operations:
            - name: get-master-data
              method: GET
              description: "Retrieve master data overview from a model."
              inputParameters:
                - name: modelId
                  in: path
                  type: string
                  required: true
                  description: "The unique provider (model) identifier"
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: "Maximum records to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: data-export-api
      resources:
        - path: /v1/namespaces
          name: namespaces
          description: "Export API namespaces."
          operations:
            - method: GET
              name: list-namespaces
              description: "List available namespaces."
              call: "analytics-cloud-data-export.list-namespaces"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/namespaces/{namespaceId}/providers
          name: providers
          description: "Model providers in a namespace."
          operations:
            - method: GET
              name: list-providers
              description: "List model providers."
              call: "analytics-cloud-data-export.list-providers"
              with:
                namespaceId: "rest.namespaceId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/models/{modelId}/fact-data
          name: fact-data
          description: "Model fact data."
          operations:
            - method: GET
              name: get-fact-data
              description: "Get fact data from a model."
              call: "analytics-cloud-data-export.get-fact-data"
              with:
                modelId: "rest.modelId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/models/{modelId}/master-data
          name: master-data
          description: "Model master data."
          operations:
            - method: GET
              name: get-master-data
              description: "Get master data from a model."
              call: "analytics-cloud-data-export.get-master-data"
              with:
                modelId: "rest.modelId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: data-export-mcp
      transport: http
      tools:
        - name: list-namespaces
          description: "List available namespaces for SAP Analytics Cloud data export."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud-data-export.list-namespaces"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-providers
          description: "List model providers (models) available for data export in a namespace."
          hints:
            readOnly: true
            openWorld: true
          call: "analytics-cloud-data-export.list-providers"
          with:
            namespaceId: "tools.namespaceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-model-metadata
          description: "Get OData metadata for a model describing its dimensions and measures."
          hints:
            readOnly: true
            openWorld: false
          call: "analytics-cloud-data-export.get-model-metadata"
          with:
            modelId: "tools.modelId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-fact-data
          description: "Retrieve fact data (transactional records) from a planning model."
          hints:
            readOnly: true
            openWorld: false
          call: "analytics-cloud-data-export.get-fact-data"
          with:
            modelId: "tools.modelId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-master-data
          description: "Retrieve master data (dimension members) from a planning model."
          hints:
            readOnly: true
            openWorld: false
          call: "analytics-cloud-data-export.get-master-data"
          with:
            modelId: "tools.modelId"
          outputParameters:
            - type: object
              mapping: "$."

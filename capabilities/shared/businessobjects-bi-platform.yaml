naftiko: "1.0.0-alpha1"

info:
  label: "SAP BusinessObjects BI Platform API"
  description: "REST API for SAP BusinessObjects BI Platform for managing documents, users, scheduling reports, and querying the CMS InfoStore repository."
  tags:
    - Business Intelligence
    - BusinessObjects
    - Reporting
    - SAP
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_BOBJ_USERNAME: SAP_BOBJ_USERNAME
      SAP_BOBJ_PASSWORD: SAP_BOBJ_PASSWORD

capability:
  consumes:
    - type: http
      namespace: businessobjects-bi-platform
      baseUri: http://{server}:{port}/biprws
      description: "SAP BusinessObjects BI Platform RESTful Web Services for report management and CMS repository access."
      authentication:
        type: apikey
        key: X-SAP-LogonToken
        value: "{{SAP_BOBJ_LOGON_TOKEN}}"
        placement: header
      resources:
        - name: authentication
          path: /logon/long
          description: "Logon and logoff for session token management."
          operations:
            - name: logon
              method: POST
              description: "Authenticate and obtain a logon token for subsequent API calls."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  userName: "{{tools.userName}}"
                  password: "{{tools.password}}"
                  auth: "secEnterprise"
            - name: logoff
              method: POST
              description: "Invalidate the current logon token."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: infostore
          path: /v1/infostore
          description: "Browse and query the CMS InfoStore repository."
          operations:
            - name: get-infostore-root
              method: GET
              description: "Get the root entry of the InfoStore repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-infostore-object
              method: GET
              description: "Get a specific InfoStore object by its CMS ID."
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The CMS object identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-infostore-children
              method: GET
              description: "List children of a specific InfoStore folder."
              inputParameters:
                - name: objectId
                  in: path
                  type: string
                  required: true
                  description: "The CMS object identifier of the parent"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number (1-based)"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Items per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cms-query
          path: /v1/cmsquery
          description: "Execute CMS queries against the BI Platform repository."
          operations:
            - name: execute-cms-query
              method: POST
              description: "Execute a CMS query against the BI Platform repository."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  query: "{{tools.query}}"

        - name: scheduling
          path: /v1/infostore/{documentId}/scheduleForms/now
          description: "Schedule documents for execution."
          operations:
            - name: schedule-document
              method: POST
              description: "Schedule a document for immediate execution."
              inputParameters:
                - name: documentId
                  in: path
                  type: string
                  required: true
                  description: "The CMS ID of the document to schedule"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  format: "{{tools.format}}"

        - name: inbox
          path: /v1/inbox
          description: "BI Inbox items."
          operations:
            - name: list-inbox-items
              method: GET
              description: "List items in the authenticated user's BI Inbox."
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: businessobjects-api
      resources:
        - path: /v1/infostore
          name: infostore
          description: "InfoStore repository browsing."
          operations:
            - method: GET
              name: get-infostore-root
              description: "Get InfoStore root."
              call: "businessobjects-bi-platform.get-infostore-root"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/infostore/{objectId}/children
          name: infostore-children
          description: "InfoStore folder children."
          operations:
            - method: GET
              name: get-infostore-children
              description: "List children of a folder."
              call: "businessobjects-bi-platform.get-infostore-children"
              with:
                objectId: "rest.objectId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/cms-query
          name: cms-query
          description: "CMS query execution."
          operations:
            - method: POST
              name: execute-cms-query
              description: "Execute a CMS query."
              call: "businessobjects-bi-platform.execute-cms-query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/inbox
          name: inbox
          description: "BI Inbox."
          operations:
            - method: GET
              name: list-inbox-items
              description: "List inbox items."
              call: "businessobjects-bi-platform.list-inbox-items"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: businessobjects-mcp
      transport: http
      tools:
        - name: get-infostore-object
          description: "Get a specific document or folder from the SAP BusinessObjects InfoStore repository."
          hints:
            readOnly: true
            openWorld: false
          call: "businessobjects-bi-platform.get-infostore-object"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: browse-infostore
          description: "Browse the children of a folder in the SAP BusinessObjects InfoStore."
          hints:
            readOnly: true
            openWorld: true
          call: "businessobjects-bi-platform.get-infostore-children"
          with:
            objectId: "tools.objectId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-reports
          description: "Execute a CMS query to search for reports and documents in the BI Platform repository."
          hints:
            readOnly: true
            openWorld: true
          call: "businessobjects-bi-platform.execute-cms-query"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: schedule-report
          description: "Schedule a BusinessObjects report for immediate execution."
          hints:
            readOnly: false
            destructive: false
          call: "businessobjects-bi-platform.schedule-document"
          with:
            documentId: "tools.documentId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-inbox-items
          description: "List items in the user's BI Inbox including completed report instances."
          hints:
            readOnly: true
            openWorld: true
          call: "businessobjects-bi-platform.list-inbox-items"
          outputParameters:
            - type: object
              mapping: "$."

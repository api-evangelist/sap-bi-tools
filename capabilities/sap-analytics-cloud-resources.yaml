naftiko: 1.0.0-alpha2
info:
  label: SAP BI Tools SAP Analytics Cloud API — Resources
  description: 'SAP BI Tools SAP Analytics Cloud API — Resources. 1 operations. Lead operation: SAP BI Tools List resources.
    Self-contained Naftiko capability covering one Sap Bi Tools business surface.'
  tags:
  - Sap Bi Tools
  - Resources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_BI_TOOLS_API_KEY: SAP_BI_TOOLS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-analytics-cloud-resources
    baseUri: https://{tenant}.{datacenter}.sapanalytics.cloud
    description: SAP BI Tools SAP Analytics Cloud API — Resources business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-Resources
      path: /api/v1/Resources
      operations:
      - name: listresources
        method: GET
        description: SAP BI Tools List resources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceType
          in: query
          type: string
          description: Filter resources by type (e.g., STORY, MODEL, FOLDER)
        - name: resourceSubType
          in: query
          type: string
          description: Filter resources by sub-type
    authentication:
      type: bearer
      token: '{{env.SAP_BI_TOOLS_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-analytics-cloud-resources-rest
    port: 8080
    description: REST adapter for SAP BI Tools SAP Analytics Cloud API — Resources. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/v1/resources
      name: api-v1-resources
      description: REST surface for api-v1-Resources.
      operations:
      - method: GET
        name: listresources
        description: SAP BI Tools List resources
        call: sap-analytics-cloud-resources.listresources
        with:
          resourceType: rest.resourceType
          resourceSubType: rest.resourceSubType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-analytics-cloud-resources-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP BI Tools SAP Analytics Cloud API — Resources. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: sap-bi-tools-list-resources
      description: SAP BI Tools List resources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-analytics-cloud-resources.listresources
      with:
        resourceType: tools.resourceType
        resourceSubType: tools.resourceSubType
      outputParameters:
      - type: object
        mapping: $.

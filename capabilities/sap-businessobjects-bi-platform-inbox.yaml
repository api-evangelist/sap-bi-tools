naftiko: 1.0.0-alpha2
info:
  label: SAP BI Tools SAP BusinessObjects BI Platform RESTful Web Services — Inbox
  description: 'SAP BI Tools SAP BusinessObjects BI Platform RESTful Web Services — Inbox. 1 operations. Lead operation: SAP
    BI Tools List BI Inbox items. Self-contained Naftiko capability covering one Sap Bi Tools business surface.'
  tags:
  - Sap Bi Tools
  - Inbox
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_BI_TOOLS_API_KEY: SAP_BI_TOOLS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-businessobjects-bi-platform-inbox
    baseUri: http://{server}:{port}/biprws
    description: SAP BI Tools SAP BusinessObjects BI Platform RESTful Web Services — Inbox business capability. Self-contained,
      no shared references.
    resources:
    - name: v1-inbox
      path: /v1/inbox
      operations:
      - name: listinboxitems
        method: GET
        description: SAP BI Tools List BI Inbox items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-SAP-LogonToken
      value: '{{env.SAP_BI_TOOLS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: sap-businessobjects-bi-platform-inbox-rest
    port: 8080
    description: REST adapter for SAP BI Tools SAP BusinessObjects BI Platform RESTful Web Services — Inbox. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/v1/inbox
      name: v1-inbox
      description: REST surface for v1-inbox.
      operations:
      - method: GET
        name: listinboxitems
        description: SAP BI Tools List BI Inbox items
        call: sap-businessobjects-bi-platform-inbox.listinboxitems
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-businessobjects-bi-platform-inbox-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP BI Tools SAP BusinessObjects BI Platform RESTful Web Services — Inbox. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: sap-bi-tools-list-bi
      description: SAP BI Tools List BI Inbox items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-businessobjects-bi-platform-inbox.listinboxitems
      outputParameters:
      - type: object
        mapping: $.

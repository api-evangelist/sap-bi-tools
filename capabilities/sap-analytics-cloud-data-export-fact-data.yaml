naftiko: 1.0.0-alpha2
info:
  label: SAP BI Tools SAP Analytics Cloud Data Export API — Fact Data
  description: 'SAP BI Tools SAP Analytics Cloud Data Export API — Fact Data. 1 operations. Lead operation: SAP BI Tools Get
    fact data from a model. Self-contained Naftiko capability covering one Sap Bi Tools business surface.'
  tags:
  - Sap Bi Tools
  - Fact Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_BI_TOOLS_API_KEY: SAP_BI_TOOLS_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-analytics-cloud-data-export-fact-data
    baseUri: https://{tenant}.{datacenter}.sapanalytics.cloud/api/v1/dataexport
    description: SAP BI Tools SAP Analytics Cloud Data Export API — Fact Data business capability. Self-contained, no shared
      references.
    resources:
    - name: providers-sac-modelId-FactData
      path: /providers/sac/{modelId}/FactData
      operations:
      - name: getfactdata
        method: GET
        description: SAP BI Tools Get fact data from a model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SAP_BI_TOOLS_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-analytics-cloud-data-export-fact-data-rest
    port: 8080
    description: REST adapter for SAP BI Tools SAP Analytics Cloud Data Export API — Fact Data. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/providers/sac/{modelid}/factdata
      name: providers-sac-modelid-factdata
      description: REST surface for providers-sac-modelId-FactData.
      operations:
      - method: GET
        name: getfactdata
        description: SAP BI Tools Get fact data from a model
        call: sap-analytics-cloud-data-export-fact-data.getfactdata
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-analytics-cloud-data-export-fact-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP BI Tools SAP Analytics Cloud Data Export API — Fact Data. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: sap-bi-tools-get-fact
      description: SAP BI Tools Get fact data from a model
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-analytics-cloud-data-export-fact-data.getfactdata
      outputParameters:
      - type: object
        mapping: $.
